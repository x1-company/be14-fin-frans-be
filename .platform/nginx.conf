user                    nginx;
error_log               /var/log/nginx/error.log warn;
pid                     /var/run/nginx.pid;
worker_processes        auto;
worker_rlimit_nofile    33282;

events {
    use epoll;
    worker_connections  1024;
    multi_accept on;
}

http {
    types_hash_max_size 2048;
    types_hash_bucket_size 128;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    include       conf.d/*.conf;

    # WebSocket/SSE 지원을 위한 connection upgrade 처리
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream springboot {
        server 127.0.0.1:5000;
        keepalive 1024;
    }

    server {
        listen        80 default_server;
        listen        [::]:80 default_server;

        access_log    /var/log/nginx/access.log main;

        # 공통 헤더 설정
        add_header 'Access-Control-Allow-Origin' 'https://frans.co.kr' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition, Authorization' always;

        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Authorization $http_authorization;

        # SSE 전용 설정
        location /api/notification/subscribe {
            proxy_pass http://springboot;

            proxy_http_version 1.1;

            # --- SSE를 위한 핵심 설정 ---
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            # 버퍼링을 꺼서 데이터를 즉시 클라이언트로 전달
            proxy_buffering off;
            proxy_cache off;

            # 헤더를 업스트림으로 전달 (WebSocket과 유사한 처리)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 타임아웃을 길게 설정하여 연결 유지
            proxy_read_timeout 3600s;

            # CORS Preflight 처리 (SSE는 GET만 필요)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://frans.co.kr' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Last-Event-ID' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            # 실제 GET 요청에 대한 CORS 헤더
            add_header 'Access-Control-Allow-Origin' 'https://frans.co.kr' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Disposition, Authorization' always;
        }

        # 일반 API 및 정적 리소스
        location / {
            proxy_pass          http://springboot;

            proxy_http_version 1.1;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization; # 로그인 토큰 전달

            proxy_buffering     on;

            # CORS Preflight 처리
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://frans.co.kr' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            # 실제 요청에 대한 CORS 헤더
            add_header 'Access-Control-Allow-Origin' 'https://frans.co.kr' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Disposition, Authorization' always;
        }

        client_header_timeout 60s;
        client_body_timeout   60s;
        keepalive_timeout     65s;  # AWS ALB의 idle timeout보다 길게
        send_timeout          75s;
        gzip                  off;

        # Elastic Beanstalk용 헬스체크 등
        include conf.d/elasticbeanstalk/healthd.conf;
    }
}
